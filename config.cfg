# ============================================
# XDP Forwarder Configuration - Server01
# ============================================
# Format: <type> <interface> <ip/mask> <src_mac> <dst_mac>
# src_mac = MAC của interface này (trên server hiện tại)
# dst_mac = MAC của thiết bị đối diện

# LOCAL interface - kết nối với Client01
# src_mac = Server01 enp7s0
# dst_mac = Client01 enp7s0 (dùng khi gửi packet ngược về client)
LOCAL enp7s0 192.168.9.1/24 20:7c:14:f8:0c:d2 20:7c:14:f8:0d:08

# REMOTE network - lớp mạng cần forward đến
REMOTE 192.168.182.0/24

# WAN interface - kết nối với Server02
# src_mac = Server01 enp5s0
# dst_mac = Server02 enp5s0
WAN enp5s0 192.168.131.1/24 20:7c:14:f8:0c:d0 20:7c:14:f8:0d:4e

# Thêm WAN khác cho load balancing:
# WAN enp4s0 192.168.11.1/24 20:7c:14:f8:0c:cf 20:7c:14:f8:0d:4d
# WAN enp6s0 192.168.203.1/24 20:7c:14:f8:0c:d1 20:7c:14:f8:0d:4f
