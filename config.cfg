# XDP Forwarder Configuration for Server01
# Format: TYPE INTERFACE MAC_ADDRESS IP/MASK
# TYPE: LOCAL (receive from XDP) or WAN (send out)

# LOCAL interfaces - packets will be received via XDP redirect
# Only packets with destination OUTSIDE this subnet will be redirected
LOCAL enp7s0 20:7c:14:f8:0c:d2 192.168.9.1/24

# WAN interfaces - packets will be forwarded out
WAN enp5s0 20:7c:14:f8:0c:d0 192.168.131.1/24

# Gateway MAC - destination MAC for outgoing packets on WAN
# This is Server02's enp5s0 MAC address
GATEWAY_MAC 20:7c:14:f8:0d:4e
